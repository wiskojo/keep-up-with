<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Custom Visual Examples</title>
  <link rel="stylesheet" href="visual-kit.css">
  <script src="visual-kit.js"></script>
  <style>
    :root {
      --surface: #fbfaf7;
      --card: #fffdf8;
      --ink: #181713;
      --muted: #706a5e;
      --line: #ded6c8;
      --rule: #e9e1d4;
      --neutral-strong: #9a9080;
      --neutral-soft: #d8d1c5;
      --accent: #3157a4;
      --accent-dark: #213a73;
      --accent-soft: #e8eef9;
      --teal: #2f7d6f;
      --orange: #c87913;
      --green: #2f7d5c;
      --red: #b83b5b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--surface);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      position: relative;
      width: 1280px;
      height: 720px;
      padding: 54px 64px 42px;
      background: var(--surface);
      overflow: hidden;
    }

    h1 {
      margin: 0;
      max-width: 980px;
      font-size: 48px;
      line-height: 1.04;
      letter-spacing: 0;
    }

    .masthead {
      display: flex;
      align-items: center;
      gap: 14px;
      height: 30px;
      margin-bottom: 24px;
    }

    .source-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 4px 10px 5px;
      border: 1.5px solid var(--ink);
      border-radius: 6px;
      background: var(--card);
      color: var(--ink);
      font-size: 18px;
      font-weight: 780;
      line-height: 1;
    }

    .kicker {
      color: var(--muted);
      font-size: 18px;
      font-weight: 760;
    }

    .subhead {
      margin-top: 12px;
      max-width: 900px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.35;
    }

    .source-note {
      position: absolute;
      left: 64px;
      bottom: 34px;
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .frame {
      position: absolute;
      left: 64px;
      right: 64px;
      top: 176px;
      bottom: 72px;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .label {
      fill: var(--ink);
      font-size: 17px;
    }

    .muted {
      fill: var(--muted);
      color: var(--muted);
    }

    .value {
      fill: var(--ink);
      font-size: 18px;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .small {
      fill: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .rule {
      stroke: var(--rule);
      stroke-width: 1;
    }

    .bar-muted { fill: var(--neutral-soft); }
    .bar-strong { fill: var(--neutral-strong); }
    .bar-focus { fill: var(--accent); }
    .bar-blue { fill: var(--accent); }
    .bar-orange { fill: var(--orange); }
    .bar-green { fill: var(--green); }

    .panel-grid {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 28px;
      height: 100%;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.72);
      padding: 22px 24px;
    }

    .panel-title {
      margin: 0 0 22px;
      font-size: 18px;
      font-weight: 760;
    }

    .metric-row {
      display: grid;
      grid-template-columns: 120px 1fr 72px;
      align-items: center;
      gap: 16px;
      margin: 18px 0;
      font-size: 15px;
    }

    .spark {
      height: 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      overflow: hidden;
    }

    .spark span {
      display: block;
      height: 100%;
      background: var(--accent);
    }

    .status-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .status-list li {
      display: grid;
      grid-template-columns: 16px 1fr;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid var(--rule);
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
    }

    .status-list li:last-child { border-bottom: 0; }

    .dot {
      width: 10px;
      height: 10px;
      margin-top: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    .dot.warn { background: var(--orange); }
    .dot.fail { background: var(--red); }

    .big-number {
      margin-top: 4px;
      font-size: 70px;
      line-height: 1;
      font-weight: 820;
      font-variant-numeric: tabular-nums;
    }

    .callout {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.38;
      max-width: 430px;
    }
  </style>
</head>
<body>
  <main id="app" aria-live="polite"></main>

  <script>
    const examples = {
      "leaderboard": {
        type: "leaderboard",
        badge: "BenchEval",
        kicker: "ranked result",
        title: "New method clears the prior public result",
        subtitle: "A source-style rank chart works when the main claim is a direct benchmark comparison.",
        note: "Synthetic example data. Use this as a design exemplar, not as evidence.",
        max: 80,
        rows: [
          { label: "Prior public result", value: 51.8, strong: true },
          { label: "Strong open baseline", value: 58.6, strong: true },
          { label: "New release", value: 67.4, focus: true },
          { label: "Internal reference", value: 72.1, muted: true }
        ]
      },
      "task-shape": {
        type: "task-shape",
        badge: "ScopeLab",
        kicker: "task shape",
        title: "The task shape changed, not just the score",
        subtitle: "Small multiples are useful when the claim depends on several measurements moving together.",
        note: "Synthetic example data. Pattern: compare prompt size, edit size, and file spread in one frame.",
        sections: [
          {
            label: "Mean prompt length",
            unit: "chars",
            max: 7600,
            ticks: ["0", "1.9k", "3.8k", "5.7k", "7.6k"],
            rows: [
              { label: "Old eval", value: 1740, strong: true },
              { label: "Public pro eval", value: 4610, strong: true },
              { label: "New eval", value: 2240, focus: true }
            ]
          },
          {
            label: "Mean solution lines added",
            unit: "lines",
            max: 760,
            ticks: ["0", "190", "380", "570", "760"],
            rows: [
              { label: "Old eval", value: 14, strong: true },
              { label: "Public pro eval", value: 128, strong: true },
              { label: "New eval", value: 646, focus: true }
            ]
          },
          {
            label: "Mean files touched",
            unit: "files",
            max: 10,
            ticks: ["0", "2.5", "5", "7.5", "10"],
            rows: [
              { label: "Old eval", value: 1.2, strong: true },
              { label: "Public pro eval", value: 4.8, strong: true },
              { label: "New eval", value: 7.1, focus: true }
            ]
          }
        ]
      },
      "audit": {
        type: "audit",
        badge: "VerifyKit",
        kicker: "audit boundary",
        title: "The result depends on the verifier",
        subtitle: "Use an audit matrix when the thread needs to separate what is measured from what is still uncertain.",
        note: "Synthetic example data. Pattern: put the score beside the verification boundary.",
        frameTop: 244,
        metrics: [
          { label: "Reported pass rate", value: "67.4%", fill: 0.674 },
          { label: "Tasks with public traces", value: "113", fill: 0.82 },
          { label: "Human-reviewed subset", value: "42", fill: 0.42 }
        ],
        checks: [
          { tone: "ok", text: "Dataset and task list are inspectable." },
          { tone: "warn", text: "Verifier labels decide how many borderline patches count." },
          { tone: "warn", text: "Harness settings change the comparison more than the chart suggests." },
          { tone: "fail", text: "Independent reproduction is not available yet." }
        ]
      },
      "timeline": {
        type: "timeline",
        badge: "ReleaseLog",
        kicker: "status path",
        title: "A compact timeline can carry the update path",
        subtitle: "Use this when a release, audit, correction, and follow-up all matter to the interpretation.",
        note: "Synthetic example data. Pattern: mix dated facts with a clear current status.",
        items: [
          { date: "Jun 2", label: "Project page goes live", status: "done" },
          { date: "Jun 3", label: "Benchmark data posted", status: "done" },
          { date: "Jun 4", label: "Outside audit flags scoring edge cases", status: "warn" },
          { date: "Jun 6", label: "Maintainers say verifier patch is in progress", status: "open" }
        ],
        current: "Status: promising release, still waiting on the scoring patch."
      }
    };

    const app = document.getElementById("app");
    const visualId = window.KUWVisual?.getVisualId("leaderboard") || "leaderboard";
    const visual = examples[visualId] || examples.leaderboard;

    function shell(data, inner) {
      const frameTop = data.frameTop || 224;
      app.innerHTML = `
        <div class="masthead">
          <span class="source-pill">${escapeHtml(data.badge || "Source")}</span>
          <span class="kicker">${escapeHtml(data.kicker || "source detail")}</span>
        </div>
        <h1>${escapeHtml(data.title)}</h1>
        <div class="subhead">${escapeHtml(data.subtitle)}</div>
        <div class="frame" style="top:${frameTop}px">${inner}</div>
        <div class="source-note">${escapeHtml(data.note)}</div>
      `;
    }

    function renderLeaderboard(data) {
      const chart = { x: 330, y: 52, w: 730, row: 78, bar: 32 };
      const ticks = [0, 20, 40, 60, 80];
      const grid = ticks.map(tick => {
        const x = chart.x + (tick / data.max) * chart.w;
        return `<line x1="${x}" y1="14" x2="${x}" y2="352" class="rule"></line>`;
      }).join("");
      const rows = data.rows.map((row, i) => {
        const y = chart.y + i * chart.row;
        const width = Math.round((row.value / data.max) * chart.w);
        const klass = row.focus ? "bar-focus" : row.strong ? "bar-strong" : "bar-muted";
        const opacity = row.muted ? .45 : 1;
        return `
          <text x="0" y="${y + 23}" class="label" opacity="${opacity}">${escapeHtml(row.label)}</text>
          <rect x="${chart.x}" y="${y}" width="${width}" height="${chart.bar}" rx="3" class="${klass}" opacity="${opacity}"></rect>
          <text x="${chart.x + width + 14}" y="${y + 23}" class="value" opacity="${opacity}">${row.value.toFixed(1)}</text>
        `;
      }).join("");

      shell(data, `
        <svg viewBox="0 0 1152 430" role="img" aria-labelledby="title desc">
          <title id="title">${escapeHtml(data.title)}</title>
          <desc id="desc">Horizontal rank chart with direct labels and a highlighted new release.</desc>
          ${grid}
          ${rows}
          <text x="${chart.x + chart.w}" y="0" text-anchor="end" class="small">higher is better</text>
        </svg>
      `);
    }

    function renderTaskShape(data) {
      const sectionH = 134;
      const left = 196;
      const width = 864;
      const barH = 22;
      const rowGap = 38;
      const sections = data.sections.map((section, si) => {
        const y0 = si * sectionH + 6;
        const tickLines = section.ticks.map((tick, ti) => {
          const x = left + (ti / (section.ticks.length - 1)) * width;
          return `
            <line x1="${x}" y1="${y0 + 28}" x2="${x}" y2="${y0 + 112}" class="rule"></line>
          `;
        }).join("");
        const rows = section.rows.map((row, ri) => {
          const y = y0 + 38 + ri * rowGap;
          const barW = Math.round((row.value / section.max) * width);
          return `
            <text x="0" y="${y + 17}" class="label" text-anchor="start">${escapeHtml(row.label)}</text>
          <rect x="${left}" y="${y}" width="${barW}" height="${barH}" rx="2" class="${row.focus ? "bar-focus" : row.strong ? "bar-strong" : "bar-muted"}"></rect>
            <text x="${left + barW + 10}" y="${y + 17}" class="value">${formatValue(row.value)}</text>
          `;
        }).join("");
        return `
          <text x="0" y="${y0 + 8}" class="small">${escapeHtml(section.label)}</text>
          ${tickLines}
          ${rows}
          <text x="${left + width}" y="${y0 + 18}" text-anchor="end" class="small">${escapeHtml(section.unit)}</text>
        `;
      }).join("");

      shell(data, `
        <svg viewBox="0 0 1152 430" role="img" aria-labelledby="title desc">
          <title id="title">${escapeHtml(data.title)}</title>
          <desc id="desc">Three small horizontal bar charts comparing task shape metrics.</desc>
          ${sections}
        </svg>
      `);
    }

    function renderAudit(data) {
      const metricRows = data.metrics.map(metric => `
        <div class="metric-row">
          <div>${escapeHtml(metric.label)}</div>
          <div class="spark"><span style="width:${Math.round(metric.fill * 100)}%"></span></div>
          <strong>${escapeHtml(metric.value)}</strong>
        </div>
      `).join("");
      const checks = data.checks.map(check => `
        <li>
          <span class="dot ${check.tone === "warn" ? "warn" : check.tone === "fail" ? "fail" : ""}"></span>
          <span>${escapeHtml(check.text)}</span>
        </li>
      `).join("");

      shell(data, `
        <div class="panel-grid">
          <section class="panel">
            <h2 class="panel-title">What the source reports</h2>
            <div class="big-number">${escapeHtml(data.metrics[0].value)}</div>
            <p class="callout">Give the main number space, then show the smaller facts that change how much confidence readers should put in it.</p>
            ${metricRows}
          </section>
          <section class="panel">
            <h2 class="panel-title">What still needs checking</h2>
            <ul class="status-list">${checks}</ul>
          </section>
        </div>
      `);
    }

    function renderTimeline(data) {
      const x0 = 112;
      const x1 = 1000;
      const y = 172;
      const step = (x1 - x0) / (data.items.length - 1);
      const items = data.items.map((item, i) => {
        const x = x0 + i * step;
        const dotClass = item.status === "warn" ? "bar-orange" : item.status === "open" ? "bar-blue" : "bar-green";
        return `
          <circle cx="${x}" cy="${y}" r="9" class="${dotClass}"></circle>
          <text x="${x}" y="${y + 44}" text-anchor="middle" class="value">${escapeHtml(item.date)}</text>
          <foreignObject x="${x - 92}" y="${y + 62}" width="184" height="98">
            <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:15px;line-height:1.25;text-align:center;color:#6f6b63">${escapeHtml(item.label)}</div>
          </foreignObject>
        `;
      }).join("");

      shell(data, `
        <svg viewBox="0 0 1152 430" role="img" aria-labelledby="title desc">
          <title id="title">${escapeHtml(data.title)}</title>
          <desc id="desc">Timeline with four dated release and audit events plus a current status callout.</desc>
          <line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" class="rule" stroke-width="2"></line>
          ${items}
          <rect x="218" y="304" width="716" height="78" rx="8" fill="rgba(255,253,248,.72)" stroke="var(--line)"></rect>
          <text x="576" y="353" text-anchor="middle" class="label">${escapeHtml(data.current)}</text>
        </svg>
      `);
    }

    function formatValue(value) {
      if (value >= 1000) return Math.round(value).toLocaleString("en-US");
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    if (visual.type === "leaderboard") renderLeaderboard(visual);
    if (visual.type === "task-shape") renderTaskShape(visual);
    if (visual.type === "audit") renderAudit(visual);
    if (visual.type === "timeline") renderTimeline(visual);
  </script>
</body>
</html>
