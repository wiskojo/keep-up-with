[[space.sections]]
key = "ai"
name = "AI"

[[space.channels]]
key = "ai.frontier"
name = "⚡・frontier"
section = "ai"
description = "Major capability shifts from leading AI labs. Use for flagship GPT, Claude, Gemini, DeepMind, Meta, and similar announcements when the main news is that the frontier moved."

[[space.channels]]
key = "ai.agents"
name = "✨・agents"
section = "ai"
description = "Major AI agent products and coding-agent surfaces from labs or platform companies. Use for Claude Code, Codex, Gemini CLI, Jules, and similar agent launches or major feature updates."

[[space.channels]]
key = "ai.products"
name = "🧑‍💻・products"
section = "ai"
description = "Hosted or packaged AI products, usually from startups or companies and often paid. Use for apps, subscriptions, workspaces, enterprise surfaces, and user-facing product launches."

[[space.channels]]
key = "ai.tools"
name = "🧰・tools"
section = "ai"
description = "Open-source or developer-facing artifacts people can install, clone, call, integrate, or build against. Use for GitHub repos, SDKs, CLIs, APIs, MCP servers, libraries, specs, data formats, infra tools, eval harnesses, demos, and developer utilities."

[[space.channels]]
key = "ai.tips"
name = "💡・tips"
section = "ai"
description = "Practical, immediately usable ways to use AI better. Use for prompting tricks, setup tweaks, shortcuts, how-I-use-this-tool notes, and repeatable techniques that do not need a broader engineering thread."

[[space.channels]]
key = "ai.tutorials"
name = "📚・tutorials"
section = "ai"
description = "Longer learning material for using AI more effectively. Use for tutorials, walkthroughs, courses, worked examples, tool introductions, and full workflows that are too substantial for tips."

[[space.channels]]
key = "ai.rumors"
name = "👀・rumors"
section = "ai"
description = "Unconfirmed AI chatter. Use for leaks, launch speculation, model sightings, screenshots, credible rumors, and claims that need verification."

[[space.channels]]
key = "ai.evals"
name = "📊・evals"
section = "ai"
description = "New evals and meaningful updates to existing evals. Use for benchmark launches, leaderboard changes, new performance numbers, methodology updates, and comparisons where the eval result is the story."

[[space.channels]]
key = "ai.models"
name = "📦・models"
section = "ai"
description = "Significant non-frontier model releases. Use only when the model has a meaningful new capability, adoption signal, benchmark result, technical angle, or ecosystem relevance, and the main news is the model itself rather than a frontier shift."

[[space.channels]]
key = "ai.engineering"
name = "🛠️・engineering"
section = "ai"
description = "Practitioner AI engineering. Use for implementation details, agent components, workflow patterns, orchestration, architecture notes, talks, postmortems, scaling lessons, deployment, observability, debugging stories, and how teams are building AI systems."

[[space.channels]]
key = "ai.research"
name = "🔬・research"
section = "ai"
description = "AI research and academic work. Use for papers, new methods, experiments, architectures, training or inference techniques, interpretability, AI-for-science results, and research-heavy technical writeups."

[[space.channels]]
key = "ai.security"
name = "🛡️・security"
section = "ai"
description = "Attacks, abuse, vulnerabilities, and safety failures. Use for prompt injection, jailbreaks, cyber capabilities, sandbox escapes, data exfiltration, model misuse, and agent security."

[[space.channels]]
key = "ai.business"
name = "💼・business"
section = "ai"
description = "Commercial AI ecosystem movement. Use for funding, pricing, acquisitions, partnerships, enterprise adoption, revenue, company strategy, chips, and market structure."

[[space.channels]]
key = "ai.policy"
name = "🏛️・policy"
section = "ai"
description = "Law, regulation, government, and geopolitics. Use for copyright lawsuits, AI regulation, export controls, government procurement, safety institutes, election rules, and compliance."
