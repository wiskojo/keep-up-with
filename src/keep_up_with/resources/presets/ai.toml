[[space.sections]]
key = "ai"
name = "AI"

[[space.channels]]
key = "ai.frontier"
name = "⚡・frontier"
section = "ai"
description = "Major capability shifts from leading AI labs. Use for flagship GPT, Claude, Gemini, DeepMind, Meta, and similar announcements when the main news is that the frontier moved."

[[space.channels]]
key = "ai.products"
name = "🧑‍💻・products"
section = "ai"
description = "Packaged AI products people use through an app, subscription, workspace, or enterprise surface. Use for Claude Code, ChatGPT features, Cursor, Perplexity, Gemini app, Codex in ChatGPT, and other user-facing launches."

[[space.channels]]
key = "ai.tools"
name = "🧰・tools"
section = "ai"
description = "Things builders can directly install, clone, call, or integrate. Use for SDKs, CLIs, APIs, MCP servers, browser extensions, GitHub repos, libraries, demos, and developer utilities."

[[space.channels]]
key = "ai.tips"
name = "💡・tips"
section = "ai"
description = "Practical ways to use AI better. Use for prompting tricks, Claude Code setups, AGENTS.md patterns, coding-agent habits, workflow recipes, how I use this tool, and small repeatable techniques."

[[space.channels]]
key = "ai.rumors"
name = "👀・rumors"
section = "ai"
description = "Unconfirmed AI chatter. Use for leaks, launch speculation, model sightings, screenshots, credible rumors, and claims that need verification. Keep attribution and uncertainty clear."

[[space.channels]]
key = "ai.evals"
name = "📊・evals"
section = "ai"
description = "Measurement, benchmarks, leaderboards, comparisons, and claim-checking. Use when the main point is whether a model, product, agent, or method actually works."

[[space.channels]]
key = "ai.engineering"
name = "🛠️・engineering"
section = "ai"
description = "Engineering writeups and implementation details. Use for architecture notes, postmortems, debugging stories, scaling lessons, production incidents, system design, and how teams are actually building AI systems."

[[space.channels]]
key = "ai.research"
name = "🔬・research"
section = "ai"
description = "New technical ideas, papers, methods, experiments, and scientific results. Use for training methods, inference techniques, architectures, interpretability, AI-for-science results, and serious technical writeups."

[[space.channels]]
key = "ai.infra"
name = "🏗️・infra"
section = "ai"
description = "The platform layer for running AI systems. Use for model serving, sandboxes, observability, orchestration, tracing, vector databases, eval harness infrastructure, deployment, scaling, Kubernetes, and production architecture."

[[space.channels]]
key = "ai.security"
name = "🛡️・security"
section = "ai"
description = "Attacks, abuse, vulnerabilities, and safety failures. Use for prompt injection, jailbreaks, cyber capabilities, sandbox escapes, data exfiltration, model misuse, and agent security."

[[space.channels]]
key = "ai.business"
name = "💼・business"
section = "ai"
description = "Commercial AI ecosystem movement. Use for funding, pricing, acquisitions, partnerships, enterprise adoption, revenue, company strategy, chips, and market structure."

[[space.channels]]
key = "ai.policy"
name = "🏛️・policy"
section = "ai"
description = "Law, regulation, government, and geopolitics. Use for copyright lawsuits, AI regulation, export controls, government procurement, safety institutes, election rules, and compliance."
